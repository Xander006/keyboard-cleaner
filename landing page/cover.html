<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1600px;
      height: 400px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #0d1f1a 0%, #0a1a2e 60%, #0d1f1a 100%);
    }

    /* Blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }

    .blob-1 {
      width: 600px; height: 500px;
      background: radial-gradient(ellipse, rgba(56,204,163,0.45) 0%, transparent 70%);
      top: -100px; left: -80px;
    }

    .blob-2 {
      width: 500px; height: 400px;
      background: radial-gradient(ellipse, rgba(20,153,204,0.35) 0%, transparent 70%);
      bottom: -80px; right: 200px;
    }

    .blob-3 {
      width: 400px; height: 300px;
      background: radial-gradient(ellipse, rgba(56,204,163,0.20) 0%, transparent 70%);
      top: 50px; right: -60px;
    }

    /* Subtle grid overlay */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Content */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 0 100px;
      gap: 60px;
    }

    .icon-wrap {
      width: 110px;
      height: 110px;
      border-radius: 28px;
      background: linear-gradient(135deg, #38CCA3, #1499CC);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      flex-shrink: 0;
      box-shadow: 0 20px 60px rgba(56,204,163,0.40);
    }

    .text {
      flex: 1;
    }

    .title {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -3px;
      line-height: 1;
      color: #fff;
      margin-bottom: 16px;
    }

    .title span {
      background: linear-gradient(135deg, #38CCA3, #1499CC);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 24px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      letter-spacing: -0.3px;
    }

    .badge {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
    }

    .pill {
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .pill-free {
      background: rgba(56,204,163,0.15);
      border: 1px solid rgba(56,204,163,0.35);
      color: #38CCA3;
    }

    .pill-mac {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="grid"></div>

  <div class="content">
    <div class="icon-wrap">⌨️</div>

    <div class="text">
      <div class="title">Keyboard <span>Cleaner</span></div>
      <div class="subtitle">Lock your keyboard while you clean it. Unlock with Touch ID.</div>
    </div>

    <div class="badge">
      <div class="pill pill-free">Free</div>
      <div class="pill pill-mac">macOS 14+</div>
    </div>
  </div>
</body>
</html>
